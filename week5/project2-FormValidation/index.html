<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <header class="container bg-body-secondary text-center h2" id="header">
        Register
    </header>
    <main class="container bg-body-secondary" id="main-container">
        <form action="" class="">
            <div class="form-group">
                <label for="name-form">Họ và Tên</label>
                <input type="text" name="" id="name-form" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="email-form">Email</label>
                <input type="text" name="" id="email-form" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="phone-form">Số điện thoại</label>
                <input type="email" name="" id="phone-form" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="password-form">Mật Khẩu</label>
                <input type="password" name="" id="password-form" class="form-control" required>
                <div id="password-strength-container">
                    <div id="password-strength-bar"></div>
                    <span id="password-strength-text"></span>
                </div>
            </div>
            <div class="form-group">
                <label for="renter-password">Xác nhận mật khẩu</label>
                <input type="password" name="" id="renter-password" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Giới tính</label>
                <div class="">
                    <input type="radio" id="male" name="gender" value="male" checked>
                    <label for="male">Male</label>
                    <input type="radio" id="female" name="gender" value="female">
                    <label for="female">Female</label>
                    <input type="radio" id="XXX" name="gender" value="XXX">
                    <label for="XXX">Other</label>
                </div>
            </div>
            <div class="form-group">
                <label for="terms">Điều khoản</label>
                <input type="checkbox" name="terms" id="terms" class="form-check-input">
                <p id="term-error">Vui lòng chấp nhận điều khoản trước khi đăng ký</p>
            </div>
            <button type="submit" class="btn btn-primary" id="submit-btn">Submit</button>
        </form>
        <!-- modal for info showing after successfully registering -->
        <div class="modal fade" id="info-modal" tabindex="-1" aria-labelledby="infoModalLabel" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="info-modal-label">"Đăng ký thành công! 🎉" và tên người dùng vừa đăng ký</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close" id="close-btn"></button>
                    </div>
                    <div class="modal-body" id="modal-body">
                        <!-- User info will be displayed here -->
                    </div>
                </div>
            </div>
        </div>
        <!-- <button type="button" class="btn btn-secondary" id="fill-test-data">fill in test data</button> -->
    </main>
    <script src="scripts/script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>
</html>
