<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=x, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <header>
        <div class="container bg-body-secondary h2 text-center" id="header" style="padding: 20px; border-radius: 8px;">
            Cool Student Management System
        </div>
    </header>
    <main>
        <div class="container bg-body-secondary" id="form-container">
            <form class="row g-3" style="padding: 10px; border-radius: 8px;">
                <div class="col-md-4">
                    <label for="inputName" class="form-label">Họ Tên</label>
                    <input type="text" class="form-control" id="inputName">
                </div>
                <div class="col-md-4">
                    <label for="inputScore" class="form-label">Điểm</label>
                    <input type="text" class="form-control" id="inputScore">
                </div>
                <div class="col-md-4 d-flex align-items-end">
                    <button type="submit" class="btn btn-primary" id="addButton">Add Student</button>
                </div>
            </form>
        </div>
        <div class="container-fluid bg-body-secondary" id="table-container">
            <div class="row" id="table-actions">
                <div class="col-md-6">
                    <input type="text" class="form-control" id="searchInput" placeholder="Search by name...">
                </div>
                <div class="col-md-6 d-flex justify-content-end">
                    <select class="form-select" id="sortSelect" style="width: 200px;">
                        <option value="">Lọc theo xếp loại...</option>
                        <option value="eval-excellent">Giỏi</option>
                        <option value="eval-good">Khá</option>
                        <option value="eval-average">Trung bình</option>
                        <option value="eval-poor">Yếu</option>
                    </select>
                </div>
            </div>
            <table class="table" id="studentTableContainer">
                <thead>
                    <tr>
                        <th scope="col">STT</th>
                        <th scope="col">Họ Tên</th>
                        <th scope="col" id="scoreColumnHeader" style="cursor: pointer;">Điểm</th>
                        <th scope="col">Xếp loại</th>
                        <th scope="col">Actions</th>
                    </tr>
                </thead>
                <tbody id="studentTableBody">
                    <!-- student datas here -->
                </tbody>
            </table>
        </div>
        <div class="container bg-body-tertiary" id="dashboard-container"
            style="padding: 10px; border-radius: 8px; margin: 10px auto;">
            <div>Total Students: <span id="totalStudents"></span></div>
            <div>Average Score: <span id="averageScore"></span></div>
        </div>
    </main>
    <script src="scripts/script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
