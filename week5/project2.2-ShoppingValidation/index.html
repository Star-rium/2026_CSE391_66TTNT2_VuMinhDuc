<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Shopping Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-lg-6 col-md-8">
                <div class="card shadow-sm">
                    <div class="card-header bg-primary text-white">
                        <h3 class="mb-0">Online Shopping Form</h3>
                    </div>
                    <div class="card-body">
                        <form id="shopping-form">
                            <!-- Product Name -->
                            <div class="mb-3">
                                <label for="prodName" class="form-label">Product Name <span class="text-danger">*</span></label>
                                <select class="form-select" id="prodName" required>
                                    <option value="" disabled selected></option>
                                    <option value="laptop">Laptop</option>
                                    <option value="phone">Phone</option>
                                    <option value="tablet">Tablet</option>
                                    <option value="headphones">Headphones</option>
                                    <option value="smartwatch">Smart Watch</option>
                                </select>
                                <div class="invalid-feedback">Please select a product.</div>
                            </div>

                            <!-- Amount -->
                            <div class="mb-3">
                                <label for="amount" class="form-label">Amount <span class="text-danger">*</span></label>
                                <input type="number" class="form-control" id="amount" min="1" max="99" placeholder="Enter quantity (1-99)" required>
                                <div class="invalid-feedback">Please enter a quantity between 1 and 99.</div>
                            </div>

                            <!-- Delivery Date -->
                            <div class="mb-3">
                                <label for="deliveryDate" class="form-label">Delivery Date <span class="text-danger">*</span></label>
                                <input type="date" class="form-control" id="deliveryDate" required>
                                <div class="invalid-feedback">Please select a delivery date.</div>
                            </div>

                            <!-- Receive Location -->
                            <div class="mb-3">
                                <label for="receiveLocation" class="form-label">Receive Location <span class="text-danger">*</span></label>
                                <textarea class="form-control" id="receiveLocation" rows="3" placeholder="Enter delivery address" required></textarea>
                                <div class="invalid-feedback">Please provide a delivery address.</div>
                            </div>

                            <!-- Note -->
                            <div class="mb-3">
                                <label for="note" class="form-label">Note</label>
                                <textarea class="form-control" id="note" rows="2" placeholder="Add any special instructions (optional)"></textarea>
                            </div>

                            <!-- Payment Options -->
                            <div class="mb-4">
                                <label class="form-label d-block">Payment Options <span class="text-danger">*</span></label>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="payOptions" id="cod" value="COD" required>
                                    <label class="form-check-label" for="cod">
                                        Cash on Delivery (COD)
                                    </label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="payOptions" id="internetBanking" value="Internet Banking" required>
                                    <label class="form-check-label" for="internetBanking">
                                        Internet Banking
                                    </label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="payOptions" id="ewallet" value="EWallet" required>
                                    <label class="form-check-label" for="ewallet">
                                        E-Wallet
                                    </label>
                                </div>
                                <div class="invalid-feedback d-block">Please select a payment option.</div>
                            </div>

                            <!-- Submit Button -->
                            <button type="submit" class="btn btn-success w-100">Place Order</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
