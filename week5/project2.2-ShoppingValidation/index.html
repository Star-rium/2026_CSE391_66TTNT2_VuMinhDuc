<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Document</title>
</head>

<body>
    <header class="container bg-body-secondary text-center h2" id="header">
        Online Shopping Form
    </header>
    <main class="container bg-body-secondary" id="main-container">
        <form action="" class="">
            <div class="mb-3">
                <label for="prodName" class="form-label" id="prodLabel">Tên sản phẩm<span class="text-danger">*</span></label>
                <select class="form-select" id="prodName" required>
                    <option value="" disabled selected></option>
                    <option value="laptop">Laptop</option>
                    <option value="phone">Phone</option>
                    <option value="tablet">Tablet</option>
                    <option value="headphones">Headphones</option>
                    <option value="smartwatch">Smart Watch</option>
                </select>
            </div>

            <div class="mb-3">
                <label for="amount" class="form-label" id="amountLabel">Số lượng<span class="text-danger">*</span></label>
                <input type="number" class="form-control" id="amount" min="1" max="99"
                    placeholder="Enter quantity (1-99)" required>
            </div>

            <div class="mb-3">
                <label for="deliveryDate" class="form-label" id="deliveryDateLabel">Ngày giao hàng<span class="text-danger">*</span></label>
                <input type="date" class="form-control" id="deliveryDate" required>
            </div>

            <div class="mb-3">
                <label for="receiveLocation" class="form-label" id="receiveLocationLabel">Địa điểm nhận<span
                        class="text-danger">*</span></label>
                <textarea class="form-control" id="receiveLocation" rows="3" placeholder="Enter delivery address"
                    required></textarea>
            </div>


            <div class="mb-3">
                <label for="note" class="form-label" id="noteLabel">Ghi chú</label>
                <textarea class="form-control" id="note" rows="2"
                    placeholder="Add any special instructions (optional)"></textarea>
            </div>

            <div class="mb-4">
                <label class="form-label d-block" id="paymentLabel">Phương thức thanh toán<span class="text-danger">*</span></label>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="payOptions" id="cod" value="COD" required>
                    <label class="form-check-label" for="cod">
                        Cash on Delivery (COD)
                    </label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="payOptions" id="internetBanking"
                        value="Internet Banking" required>
                    <label class="form-check-label" for="internetBanking">
                        Internet Banking
                    </label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="payOptions" id="ewallet" value="EWallet"
                        required>
                    <label class="form-check-label" for="ewallet">
                        E-Wallet
                    </label>
                </div>
            </div>

            <button type="submit" class="btn btn-success w-100" id="submit-btn">Place Order</button>
            <button type="button" class="btn btn-secondary w-100" id="dummy-btn">Fill dummy datas</button>
    </main>
    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
