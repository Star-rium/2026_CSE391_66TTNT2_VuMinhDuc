<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nice form lol</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>
        <header class="header">Get in touch with us by filling contact form below</header>
        <div class="contact-form">
            <form action="#" class="contact-form">
                <div class="form-group">
                    <span class="form-input">
                        <input type="text" name="name" id="name" placeholder="* Enter your full name"
                            required>
                    </span>
                    <span class="form-input">
                        <input type="text" name="email" id="email" placeholder="* Enter your email address"
                            required>
                    </span>
                </div>
                <input type="text" class="form-subject" name="subject" id="subject" placeholder="Enter your subject">
                <textarea class="form-textarea" name="message" id="message" cols="30" rows="10"
                    placeholder="* Your message here" required></textarea>
                <div class="form-footer">
                    <button type="submit">Send message</button>
                    <p>* Please fill all required fields, thanks</p>
                </div>
            </form>
        </div>
    </main>
</body>

</html>
